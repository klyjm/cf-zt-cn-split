name: 每日同步 CN Split Tunnels 到 Cloudflare Zero Trust
permissions:
  contents: read

on:
  schedule:
    - cron: '0 3 * * 0'  # 每周日北京时间11:00（UTC 3:00）
  workflow_dispatch:         # 手动触发按钮

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2/v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 运行同步脚本
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROFILE_ID: ${{ secrets.CF_PROFILE_ID }}
          MODE: exclude                     # 可改成 include
        run: python cf-zt-cn-split.py
